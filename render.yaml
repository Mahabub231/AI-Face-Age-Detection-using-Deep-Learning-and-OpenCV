services:
  - type: web
    name: ai-faceage-detection
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 180 --preload
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: AGE_AI_MODE
        value: opencv
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.9"
      # ↓ Add these manually in Render dashboard (Settings > Environment)
      # DATABASE_URL      = your Supabase pooler URL
      # CLOUDINARY_CLOUD_NAME = dtibugsis
      # CLOUDINARY_API_KEY    = your key
      # CLOUDINARY_API_SECRET = your secret
